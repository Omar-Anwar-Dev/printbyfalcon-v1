# Error tracking UI (GlitchTip) — https://errors.printbyfalcon.com
# Basic-auth-protected: only admins should reach it.

server {
    listen 80;
    listen [::]:80;
    server_name errors.printbyfalcon.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name errors.printbyfalcon.com;

    ssl_certificate     /etc/letsencrypt/live/errors.printbyfalcon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/errors.printbyfalcon.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # Require basic auth — file generated with htpasswd, see runbook
    auth_basic           "Print By Falcon — admins only";
    auth_basic_user_file /etc/nginx/.htpasswd_errors;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
