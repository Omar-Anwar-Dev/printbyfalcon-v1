# Rate-limit zones shared by all site configs.
# Filename uses `00-` prefix so nginx loads it before printbyfalcon.com.conf /
# staging.printbyfalcon.com.conf, which reference `zone=auth_limit`.
# Deployed to /etc/nginx/conf.d/ on the VPS (runbook §2).
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
