# Staging — https://staging.printbyfalcon.com
# Place at /etc/nginx/conf.d/staging.printbyfalcon.com.conf on the VPS.

server {
    listen 80;
    listen [::]:80;
    server_name staging.printbyfalcon.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.printbyfalcon.com;

    ssl_certificate     /etc/letsencrypt/live/staging.printbyfalcon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.printbyfalcon.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Keep staging out of search engines
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 10m;

    location /storage/ {
        alias /var/pbf/staging/storage/;
        expires 1d;
        access_log off;
    }

    # Staging Next.js listens on 127.0.0.1:3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }
}
