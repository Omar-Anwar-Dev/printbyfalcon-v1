# Production — https://printbyfalcon.com (and www).
# Place at /etc/nginx/conf.d/printbyfalcon.com.conf on the VPS.
# Certbot populates the SSL directives block automatically after first issuance.

server {
    listen 80;
    listen [::]:80;
    server_name printbyfalcon.com www.printbyfalcon.com;

    # ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name printbyfalcon.com www.printbyfalcon.com;

    ssl_certificate     /etc/letsencrypt/live/printbyfalcon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/printbyfalcon.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (app may override via Next config)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload cap (product images)
    client_max_body_size 10m;

    # Static storage (product images, invoice PDFs)
    location /storage/ {
        alias /var/pbf/storage/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # App (Next.js standalone listens on 127.0.0.1:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }

    # Extra rate-limit on auth paths (webhooks excluded).
    # Note: regex must be double-quoted — nginx otherwise reads `{2}` as a block delimiter.
    location ~ "^/(api/auth|[a-z]{2}/login|[a-z]{2}/sign-in|[a-z]{2}/admin/login)" {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
