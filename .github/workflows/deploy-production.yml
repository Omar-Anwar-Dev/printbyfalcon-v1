name: Deploy to Production

# MANUAL ONLY. Prod does not auto-deploy on push.
# Trigger: Actions tab → "Deploy to Production" → Run workflow.
# Protected by the `production` GitHub Environment (required reviewer).
#
# See docs/runbook.md §4.2 for the full deploy procedure.

on:
  workflow_dispatch:
    inputs:
      confirm_smoke_tested_on_staging:
        description: 'I verified the same commit is green on staging (§5 smoke checklist)'
        required: true
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + rebuild prod stack
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://printbyfalcon.com

    steps:
      - name: Guardrail — staging must be confirmed
        if: ${{ inputs.confirm_smoke_tested_on_staging != true }}
        run: |
          echo "::error::You must tick the staging-verified checkbox before prod deploy."
          echo "::error::See docs/runbook.md §4.2 — staging smoke test is a prerequisite."
          exit 1

      - name: Trigger production rebuild over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            bash -lc '/var/pbf/repo/scripts/deploy-production.sh'

      # Authoritative health validation lives in scripts/deploy-production.sh
      # (runs on the VPS, bypasses Cloudflare's bot-management challenge).
      # If the SSH step above succeeded, the internal probe already passed.
      # This step is informational only — confirms public reachability when
      # Cloudflare allows it (often enough on real browsers; bot-detected
      # 403 from the runner is expected and non-fatal here).
      - name: External reachability check (informational)
        run: |
          response=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 10 https://printbyfalcon.com/api/health || echo "000")
          echo "External /api/health → HTTP $response"
          if [ "$response" = "200" ]; then
            echo "::notice::Public endpoint reachable (HTTP 200)."
          elif [ "$response" = "403" ]; then
            echo "::notice::Cloudflare bot-management challenged the runner (HTTP 403). The internal SSH probe is authoritative — deploy already verified."
          else
            echo "::warning::Unexpected external HTTP $response. Internal probe passed; investigate Cloudflare/Nginx if customers report issues."
          fi
